"txgraph.cpp::TotalMemoryUsage" >= "SizeOf(Cluster) + SizeOf(std::unique_ptr<Cluster>)"

[hints."univalue_read.cpp::read"]
lean_proposition = "∀ (len raw end_ depth : Nat) (ok : Bool), depth ≤ 512 ∧ raw ≤ end_ ∧ end_ ≤ len ∧ ok = true → (end_ = len ∧ raw = end_)"
smt_constraint = "(declare-const len Int)\n(declare-const raw Int)\n(declare-const end Int)\n(declare-const depth Int)\n(declare-const ok Int)\n(assert (>= len 0))\n(assert (>= raw 0))\n(assert (>= end 0))\n(assert (>= depth 0))\n(assert (<= depth 512))\n(assert (<= raw end))\n(assert (<= end len))\n(assert (or (= ok 0) (= ok 1)))\n(assert (=> (= ok 1) (and (= end len) (= raw end))))"
source = "Golden model for UniValue::read: Mathlib.Data.List.Basic + Lean.Data.Json; raw/end pointer arithmetic abstracted to Nat indices and tokenization success abstracted to Bool/Option"

[hints."randomenv.cpp::RandAddDynamicEnv"]
lean_proposition = "∀ (sys steady hi : Nat), sys = 1 ∧ steady = 1 ∧ hi = 1 → sys + steady + hi = 3"
smt_constraint = "(declare-const sys Int)\\n(declare-const steady Int)\\n(declare-const hi Int)\\n(assert (>= sys 0))\\n(assert (>= steady 0))\\n(assert (>= hi 0))\\n(assert (= sys 1))\\n(assert (= steady 1))\\n(assert (= hi 1))\\n(assert (= (+ sys steady hi) 3))"
source = "Non-vacuous clock-sampling model: std::chrono::system_clock/steady_clock/high_resolution_clock feed 3 distinct samples into hasher"

[hints."randomenv.cpp::AddFile"]
lean_proposition = "∀ (fd : Option Nat) (bytesRead total : Nat), fd.isSome ∧ bytesRead ≤ 4096 ∧ total < 1048576 → total + bytesRead ≤ 1048576 + 4096"
smt_constraint = "(declare-const fd_ok Int)\n(declare-const bytesRead Int)\n(declare-const total Int)\n(assert (or (= fd_ok 0) (= fd_ok 1)))\n(assert (>= bytesRead 0))\n(assert (<= bytesRead 4096))\n(assert (>= total 0))\n(assert (< total 1048576))\n(assert (=> (= fd_ok 1) (<= (+ total bytesRead) 1052672)))"
source = "Mathlib.System.IO + Mathlib.Data.ByteArray: fd를 단순 Int가 아닌 Option Nat(유효 핸들)로 모델링, 바이트 누적 total은 ByteArray 청크(4096)와 1MiB 상한에 연결"

[hints."txgraph.cpp::TotalMemoryUsage"]
lean_proposition = "∀ (dyn_map dyn_lin dyn_dep size_cluster size_ptr result : Nat), result = dyn_map + dyn_lin + dyn_dep + size_cluster + size_ptr → result ≥ size_cluster + size_ptr"
smt_constraint = "(declare-const dyn_map Int)\n(declare-const dyn_lin Int)\n(declare-const dyn_dep Int)\n(declare-const size_cluster Int)\n(declare-const size_ptr Int)\n(declare-const result Int)\n(assert (>= dyn_map 0))\n(assert (>= dyn_lin 0))\n(assert (>= dyn_dep 0))\n(assert (>= size_cluster 0))\n(assert (>= size_ptr 0))\n(assert (= result (+ dyn_map dyn_lin dyn_dep size_cluster size_ptr)))\n(assert (>= result (+ size_cluster size_ptr)))"
source = "Mathlib SizeOf 기반 정밀화: sizeof/플랫폼 상수를 제거하고 구조적 SizeOf(Cluster) 및 포인터 래퍼 비용을 Nat/Int 상수로 추상화"

[hints."group_impl.h::secp256k1_gej_double"]
lean_proposition = "let p : Nat := (2^256) - (2^32) - 977; let inv2 : ZMod p := ((p + 1) / 2 : Nat); ∀ (x1 y1 z1 : ZMod p), let z3 := y1 * z1; let s := y1^2; let l := (3 * (x1^2)) * inv2; let t := -(x1 * s); let x3 := l^2 + 2 * t; let y3 := -(l * (x3 + t) + s^2); (y1^2 = x1^3 + 7) → (y3^2 = x3^3 + 7)"
smt_constraint = "(declare-const p Int) (declare-const inf Int) (declare-const x1 Int) (declare-const y1 Int) (declare-const z1 Int) (declare-const z3 Int) (assert (= p 115792089237316195423570985008687907853269984665640564039457584007908834671663)) (assert (or (= inf 0) (= inf 1))) (assert (>= x1 0)) (assert (< x1 p)) (assert (>= y1 0)) (assert (< y1 p)) (assert (>= z1 0)) (assert (< z1 p)) (assert (= z3 (mod (* y1 z1) p))) (assert (= typ inf)) (assert (= expected (mod (+ (+ x1 y1) (+ z3 7)) p)))"
source = "Special model (mistral/labs-leanstral-2603): Data.ZMod.Basic 기반으로 projective doubling 단계가 ZMod p 닫힘을 유지하며 커브 방정식 보존을 요구하는 표준 불변량"

